version: '3.8'

services:
  ups-monitor:
    image: tinchodeluca/ups-monitor:latest
    container_name: ups-monitor
    privileged: true
    restart: unless-stopped

    environment:
      - UPS_VID=0x0665
      - UPS_PID=0x5161
      - CHECK_INTERVAL=10
      - SHUTDOWN_VOLTAGE=11.0
      - SHUTDOWN_DELAY=300

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /dev/bus/usb:/dev/bus/usb

    # Alternativa: device específico en lugar de /dev/bus/usb completo
    # devices:
    #   - /dev/hidraw0:/dev/hidraw0
